<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin - Plataforma Oncológica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/static/geppetto-digital-theme.css" rel="stylesheet">
    <script src="/js/brand-config.js"></script>
</head>
<body class="bg-gradient-to-br from-gray-50 via-gray-100 to-gray-50 min-h-screen">
    <header class="bg-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-gray-700 to-gray-900 rounded-lg flex items-center justify-center text-white">
                        <i class="fas fa-cog"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold">Portal Administrativo</h1>
                        <p class="text-sm text-gray-600">Gestão completa do sistema</p>
                    </div>
                </div>
                <a href="/preview.html" class="text-gray-600 hover:text-gray-800">
                    <i class="fas fa-home text-xl"></i>
                </a>
            </div>
        </div>
    </header>
    <main class="container mx-auto px-4 py-8">
        <div class="glass-effect rounded-xl p-8 text-center">
            <i class="fas fa-shield-alt text-6xl text-gray-700 mb-4"></i>
            <h2 class="text-3xl font-bold mb-4">Centro de Controle Administrativo</h2>
            <p class="text-gray-600 mb-6">Configurações, usuários, permissões e monitoramento do sistema</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white rounded-lg p-6 shadow">
                    <i class="fas fa-users-cog text-3xl text-blue-600 mb-3"></i>
                    <h3 class="font-bold mb-2">Gestão de Usuários</h3>
                    <p class="text-sm text-gray-600">Controle de acesso</p>
                </div>
                <div class="bg-white rounded-lg p-6 shadow">
                    <i class="fas fa-chart-line text-3xl text-green-600 mb-3"></i>
                    <h3 class="font-bold mb-2">Monitoramento</h3>
                    <p class="text-sm text-gray-600">Métricas em tempo real</p>
                </div>
                <div class="bg-white rounded-lg p-6 shadow">
                    <i class="fas fa-database text-3xl text-purple-600 mb-3"></i>
                    <h3 class="font-bold mb-2">Backup & Logs</h3>
                    <p class="text-sm text-gray-600">Segurança de dados</p>
                </div>
            </div>
        </div>
    </main>
    <script>if (window.BrandConfig) window.BrandConfig.apply();</script>
</body>
</html>
